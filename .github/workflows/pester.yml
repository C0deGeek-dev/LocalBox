name: pester

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Pester 5
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run unit tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0.0
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/unit'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'tests/results.xml'
          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: tests/results.xml

  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Analyze launcher module
        shell: pwsh
        run: |
          Invoke-ScriptAnalyzer -Path local-llm -Recurse -Settings ./PSScriptAnalyzerSettings.psd1 -EnableExit

  proxy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test tooling
        run: python -m pip install pytest ruff

      - name: Lint proxy
        run: ruff check localbox-proxy tests/test_no_think_proxy.py

      - name: Run proxy tests
        run: python -m pytest tests/test_no_think_proxy.py -q

  tui:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build TUI
        run: dotnet build tui/LocalBox.Tui/LocalBox.Tui.csproj -nologo
