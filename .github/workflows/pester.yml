name: pester

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    # Native workspace gate, tri-platform (Windows/Linux/macOS are equal
    # tier-1). The shared localx-llama crates are a public rev-pinned git
    # dependency, so no fetch secret is needed.
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6
      - name: Install toolchain (pinned by rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo check --workspace

  unit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Pester 5
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run unit tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0.0
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/unit'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'tests/results.xml'
          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: tests/results.xml

  launcher-contract:
    # Cross-repo guard: assert this launcher still satisfies LocalBench's
    # documented contract (functions and required parameters), so a breaking
    # launcher change fails this repo's build, not a user's tuning run.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout LocalBench
        uses: actions/checkout@v6
        with:
          repository: C0deGeek-dev/LocalBench
          path: external/LocalBench

      - name: Install Pester 5
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Assert contract conformance
        shell: pwsh
        env:
          LOCALBOX_ROOT: ${{ github.workspace }}
        run: |
          Import-Module Pester -MinimumVersion 5.0.0
          $config = New-PesterConfiguration
          $config.Run.Path = 'external/LocalBench/tests/launcher-contract-localbox.tests.ps1'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Analyze launcher module
        shell: pwsh
        run: |
          Invoke-ScriptAnalyzer -Path local-llm -Recurse -Settings ./PSScriptAnalyzerSettings.psd1 -EnableExit

  proxy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test tooling
        run: python -m pip install pytest ruff

      - name: Lint proxy
        run: ruff check localbox-proxy tests/test_no_think_proxy.py

      - name: Run proxy tests
        run: python -m pytest tests/test_no_think_proxy.py -q

  tui:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build TUI
        run: dotnet build tui/LocalBox.Tui/LocalBox.Tui.csproj -nologo
